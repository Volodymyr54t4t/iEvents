<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль - iEvents</title>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/page-spacing.css">
    <script src="js/config.js"></script>
</head>

<body>
    <header id="header"></header>

    <main class="main-content">
        <div class="profile-container">
            <h1 class="page-title">Мій профіль</h1>

            <div class="role-badge" id="roleBadge">
                <span class="role-label">Роль:</span>
                <span class="role-value" id="roleValue">Учень</span>
            </div>

            <form id="profileForm" class="profile-form">
                <div class="avatar-section">
                    <div class="avatar-preview" id="avatarPreview" onclick="openAvatarEditor()">
                        <span class="avatar-placeholder">📷</span>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    <div class="avatar-button-group">
                        <button type="button" class="btn btn-secondary"
                            onclick="document.getElementById('avatarInput').click()">
                            📤 Завантажити фото
                        </button>
                        <button type="button" class="btn btn-secondary" id="clearAvatarBtn" style="display: none;"
                            onclick="clearAvatar()">
                            ✕ Видалити фото
                        </button>
                    </div>
                </div>

                <div id="avatarEditorModal" class="modal" style="display: none;">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Редагування фото профілю</h2>
                            <button type="button" class="modal-close" onclick="closeAvatarEditor()">×</button>
                        </div>
                        <div class="modal-body">
                            <div class="editor-container">
                                <div class="preview-area">
                                    <canvas id="avatarCanvas"></canvas>
                                </div>
                                <div class="controls-area">
                                    <div class="control-group">
                                        <label>🔍 Масштаб</label>
                                        <input type="range" id="scaleSlider" min="0.5" max="3" step="0.1" value="1">
                                        <span class="slider-value" id="scaleValue">100%</span>
                                    </div>
                                    <div class="control-group">
                                        <label>🔄 Поворот (°)</label>
                                        <input type="range" id="rotateSlider" min="0" max="360" step="15" value="0">
                                        <span class="slider-value" id="rotateValue">0°</span>
                                    </div>
                                    <div class="control-group">
                                        <label>↔️ Горизонтальне відзеркалення</label>
                                        <input type="checkbox" id="flipHorizontal" class="checkbox">
                                    </div>
                                    <div class="control-group">
                                        <label>↕️ Вертикальне відзеркалення</label>
                                        <input type="checkbox" id="flipVertical" class="checkbox">
                                    </div>
                                    <button type="button" class="btn btn-secondary btn-full"
                                        onclick="resetAvatarEditor()">
                                        ↻ Скинути зміни
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary"
                                onclick="closeAvatarEditor()">Скасувати</button>
                            <button type="button" class="btn btn-primary" onclick="confirmAvatar()">✓
                                Підтвердити</button>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="lastName">Прізвище *</label>
                        <input type="text" id="lastName" required placeholder="Іванов">
                    </div>
                    <div class="form-group">
                        <label for="firstName">Ім'я *</label>
                        <input type="text" id="firstName" required placeholder="Іван">
                    </div>
                </div>

                <div class="form-group">
                    <label for="middleName">По батькові</label>
                    <input type="text" id="middleName" placeholder="Іванович">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telegram">Telegram (нік)</label>
                        <input type="text" id="telegram" placeholder="@username">
                    </div>
                    <div class="form-group">
                        <label for="phone">Номер телефону</label>
                        <input type="tel" id="phone" placeholder="+380 XX XXX XX XX">
                    </div>
                </div>

                <div class="form-group">
                    <label for="birthDate">Дата народження *</label>
                    <input type="date" id="birthDate" required>
                </div>

                <div class="form-group">
                    <label for="city">Місто *</label>
                    <input type="text" id="city" required placeholder="Київ">
                </div>

                <div class="form-group" id="schoolSelectGroup" style="display: none;">
                    <label for="schoolSelect">Навчальний заклад *</label>
                    <select id="schoolSelect" required>
                        <option value="">Оберіть заклад...</option>
                    </select>
                </div>

                <div class="form-group" id="schoolTextGroup">
                    <label for="school">Навчальний заклад</label>
                    <input type="text" id="school" placeholder="Школа №1">
                </div>

                <div class="form-row" id="gradeStudentGroup" style="display: none;">
                    <div class="form-group">
                        <label for="gradeNumber">Клас *</label>
                        <input type="text" id="gradeNumber" placeholder="10" maxlength="2">
                    </div>
                    <div class="form-group">
                        <label for="gradeLetter">Літера (за бажанням)</label>
                        <input type="text" id="gradeLetter" placeholder="А" maxlength="2">
                    </div>
                </div>

                <div class="form-group" id="gradeTextGroup">
                    <label for="grade">Клас/Курс</label>
                    <input type="text" id="grade" placeholder="10-А">
                </div>

                <div class="form-row" id="clubGroup" style="display: none;">
                    <div class="form-group">
                        <label for="clubInstitution">Заклад гуртка</label>
                        <input type="text" id="clubInstitution" placeholder="Назва закладу">
                    </div>
                    <div class="form-group">
                        <label for="clubName">Назва гуртка</label>
                        <input type="text" id="clubName" placeholder="Назва гуртка">
                    </div>
                </div>

                <div class="form-group">
                    <label for="interests">Інтереси та хобі</label>
                    <textarea id="interests" rows="4" placeholder="Розкажіть про свої інтереси..."></textarea>
                </div>

                <div class="form-group">
                    <label for="bio">Про себе</label>
                    <textarea id="bio" rows="4" placeholder="Розкажіть про себе..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Зберегти профіль</button>
                <button type="button" class="btn btn-passport" id="passportBtn" onclick="openPassportModal()">
                    Паспорт успiшностi учня
                </button>
                <div id="profileMessage" class="message"></div>
            </form>
        </div>
    </main>

    <!-- Student Success Passport Modal -->
    <div id="passportModal" class="passport-modal-overlay">
        <div class="passport-modal">
            <div class="passport-modal-header">
                <div class="passport-header-left">
                    <h2>Паспорт успiшностi</h2>
                    <p class="passport-header-sub" id="passportStudentName"></p>
                </div>
                <div class="passport-header-actions">
                    <button class="passport-download-btn" onclick="downloadPassportPDF()" id="passportDownloadBtn"
                        disabled>
                        Завантажити PDF
                    </button>
                    <button class="passport-close-btn" onclick="closePassportModal()">&times;</button>
                </div>
            </div>
            <div class="passport-modal-body" id="passportBody">
                <div class="passport-loading" id="passportLoading">
                    <div class="passport-spinner"></div>
                    <p>Збираємо данi...</p>
                </div>

                <div class="passport-content" id="passportContent" style="display:none;">
                    <!-- Printable area -->
                    <div id="passportPrintArea">
                        <!-- Header card -->
                        <div class="passport-profile-card" id="passportProfileCard">
                            <div class="passport-avatar" id="passportAvatar"></div>
                            <div class="passport-profile-info">
                                <h3 id="passportFullName"></h3>
                                <div class="passport-profile-meta">
                                    <span class="passport-tag" id="passportSchool"></span>
                                    <span class="passport-tag" id="passportGrade"></span>
                                    <span class="passport-tag" id="passportCity"></span>
                                </div>
                                <div class="passport-profile-details" id="passportProfileDetails"></div>
                            </div>
                        </div>

                        <!-- Stats summary -->
                        <div class="passport-stats-grid" id="passportStatsGrid"></div>

                        <!-- Competitions list -->
                        <div class="passport-section" id="passportCompetitionsSection">
                            <h4 class="passport-section-title">Участь у конкурсах</h4>
                            <div class="passport-section-body" id="passportCompetitionsList"></div>
                        </div>

                        <!-- Results -->
                        <div class="passport-section" id="passportResultsSection">
                            <h4 class="passport-section-title">Результати та досягнення</h4>
                            <div class="passport-section-body" id="passportResultsList"></div>
                        </div>

                        <!-- Rehearsals -->
                        <div class="passport-section" id="passportRehearsalsSection">
                            <h4 class="passport-section-title">Репетицii</h4>
                            <div class="passport-section-body" id="passportRehearsalsList"></div>
                        </div>

                        <!-- Bio / Interests -->
                        <div class="passport-section" id="passportBioSection">
                            <h4 class="passport-section-title">Про учня</h4>
                            <div class="passport-section-body" id="passportBioContent"></div>
                        </div>

                        <!-- Footer -->
                        <div class="passport-footer-note" id="passportFooterNote"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="js/role.js"></script>
    <script src="js/components.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
